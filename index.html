<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuoi len di ♡</title>
    <link rel="Shortcut Icon" href="images/a4.jpg" type="image/x-icon" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: "Aptos", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ff9ec1 0%, #d81b60 100%);
            color: #fff;
            position: relative;
        }

        /* Intro */
        #intro {
            position: fixed;
            inset: 0;
            background: linear-gradient(45deg, #ff9ec1, #c2185b, #ff4081, #d81b60);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            text-align: center;
            transition: opacity 1.2s ease;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #intro.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .intro-img {
            width: 240px;
            height: 240px;
            object-fit: cover;
            border-radius: 50%;
            border: 8px solid rgba(255,255,255,0.95);
            box-shadow: 0 0 60px rgba(255,255,255,0.8), 0 0 120px rgba(255,105,180,0.7);
            margin-bottom: 40px;
            animation: float 5.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50%      { transform: translateY(-32px) rotate(10deg) scale(1.05); }
        }

        .intro-text {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, #ffeb3b, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-fill-color: transparent;
            color: #fff; /* fallback color nếu browser không hỗ trợ gradient text */
            text-shadow: 0 0 25px #ff69b4, 0 0 50px #c2185b;
            letter-spacing: 2px;
            padding: 0 30px;
            display: inline-block; /* fix lỗi hiển thị trên một số thiết bị */
            animation: glow 2.5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #ff69b4, 0 0 40px #c2185b; transform: scale(1); }
            to   { text-shadow: 0 0 40px #ff4081, 0 0 80px #d81b60; transform: scale(1.06); }
        }

        /* Canvas particle */
        canvas.canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            transition: opacity 2s ease;
        }

        /* Signature */
        .signature {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: rgba(255,255,255,0.97);
            text-shadow: 0 0 15px #000, 0 0 25px rgba(255,105,180,0.6);
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 10px 24px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* Icon rơi (tim, hoa,...) - từ đầu */
        .fall {
            position: fixed;
            top: -80px;
            font-size: 28px;
            font-weight: bold;
            color: rgba(255,255,255,0.92);
            text-shadow: 0 0 12px rgba(0,0,0,0.7);
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 5;
            white-space: nowrap;
        }
        @keyframes fall {
            to {
                transform: translateY(130vh) rotate(1080deg);
                opacity: 0.03;
            }
        }

        /* Ảnh rơi tuần tự */
        .photo-fall {
            position: fixed;
            top: -220px;
            width: 110px;
            height: 150px;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.45);
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            animation: photoFall linear forwards;
        }

        @keyframes photoFall {
            0%   { top: -220px; opacity: 0; transform: translateX(0) rotate(-6deg); }
            15%  { opacity: 1; }
            100% { top: 55%; opacity: 0.85; transform: translateX(0) rotate(6deg); }
        }

        /* Trái tim đập */
        #beating-heart {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 320px;
            color: #fff;
            text-shadow: 0 0 50px #ff69b4, 0 0 100px #c2185b, 0 0 150px #d81b60;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
        }

        #beating-heart.visible {
            opacity: 1;
            animation: beat 1.3s infinite ease-in-out;
        }

        @keyframes beat {
            0%   { transform: translate(-50%, -50%) scale(1) rotate(-4deg); }
            15%  { transform: translate(-50%, -50%) scale(1.28) rotate(4deg); }
            30%  { transform: translate(-50%, -50%) scale(1) rotate(-4deg); }
            45%  { transform: translate(-50%, -50%) scale(1.22) rotate(3deg); }
            60%  { transform: translate(-50%, -50%) scale(1) rotate(-3deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }

        /* Happy Birthday */
        #happy-birthday {
            position: fixed;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-family: "Aptos", "Helvetica Neue", Arial, sans-serif;
            font-size: 54px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 25px #ff69b4, 0 0 50px #c2185b, 0 0 80px #d81b60;
            letter-spacing: 5px;
            opacity: 0;
            z-index: 9;
            pointer-events: none;
            white-space: nowrap;
            transition: opacity 2.5s ease 0.5s;
        }

        #happy-birthday.visible {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .intro-img { width: 200px; height: 200px; }
            .intro-text { font-size: 26px; }
            .signature { font-size: 16px; padding: 8px 18px; }
            #beating-heart { font-size: 220px; }
            #happy-birthday { font-size: 38px; top: 8%; }
            .photo-fall { width: 80px; height: 110px; }
        }
    </style>
</head>
<body>

    <!-- Intro -->
    <div id="intro">
        <img src="images/a4.jpg" class="intro-img" alt="Ảnh đặc biệt">
        <div class="intro-text">💕 Nhấn vào để xem quà nè 💕</div>
    </div>

    <!-- Canvas particle -->
    <canvas class="canvas"></canvas>

    <!-- Happy Birthday -->
    <div id="happy-birthday">Happy Birthday</div>

    <!-- Trái tim đập -->
    <div id="beating-heart">❤️</div>

    <!-- Chữ ký -->
    <div class="signature">Coding by Bee:D</div>

    <!-- Nhạc -->
    <audio id="music" preload="auto" loop>
        <source src="just.mp3" type="audio/mpeg">
    </audio>

    <script>
        // =============================================
        //    HỆ THỐNG PARTICLE
        // =============================================
        var S = {
            init: function () {
                S.Drawing.init('.canvas');
                document.body.classList.add('body--ready');
                S.UI.simulate([
                    {text:"oo-ohh", delay: 2000},
                    {text:"baby", delay: 950},
                    {text:"just", delay:950},
                    {text:"youuu", delay:1700},
                    {text:"thinking", delay:1000},
                    {text:"about", delay:900},
                    {text:"youu!!", delay:1300},
                    {text:"baby", delay:800},
                    {text:"just", delay:800},
                    {text:"youuu!!", delay:1400},
                    {text:"thinking", delay:900},
                    {text:"about", delay:900},
                    {text:"youu!!", delay:900},
                    {text:"❤️❤️❤️", delay:3000},
                    {text:"5/3/2008", delay:3500},
                    {text:"#countdown 3", delay:3000}
                ]);
                S.Drawing.loop(function () {
                    S.Shape.render();
                });
            }
        };

        S.Drawing = (function () {
            var canvas, context, renderFn,
                requestFrame = window.requestAnimationFrame ||
                    window.webkitRequestAnimationFrame ||
                    window.mozRequestAnimationFrame ||
                    window.oRequestAnimationFrame ||
                    window.msRequestAnimationFrame ||
                    function (callback) { window.setTimeout(callback, 1000 / 60); };

            return {
                init: function (el) {
                    canvas = document.querySelector(el);
                    context = canvas.getContext('2d');
                    this.adjustCanvas();
                    window.addEventListener('resize', function () {
                        S.Drawing.adjustCanvas();
                    });
                },
                loop: function (fn) {
                    renderFn = !renderFn ? fn : renderFn;
                    this.clearFrame();
                    renderFn();
                    requestFrame.call(window, this.loop.bind(this));
                },
                adjustCanvas: function () {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                },
                clearFrame: function () {
                    context.clearRect(0, 0, canvas.width, canvas.height);
                },
                getArea: function () {
                    return {w: canvas.width, h: canvas.height};
                },
                drawCircle: function (p, c) {
                    context.fillStyle = c.render();
                    context.beginPath();
                    context.arc(p.x, p.y, p.z, 0, 2 * Math.PI, true);
                    context.closePath();
                    context.fill();
                }
            };
        }());

        S.UI = (function () {
            var interval, currentAction, time,
                maxShapeSize = 30,
                sequence = [],
                cmd = '#';

            function formatTime(date) {
                var h = date.getHours(), m = date.getMinutes();
                m = m < 10 ? '0' + m : m;
                return h + ':' + m;
            }

            function getValue(value) {
                return value && value.split(' ')[1];
            }

            function getAction(value) {
                value = value && value.split(' ')[0];
                return value && value[0] === cmd && value.substring(1);
            }

            function timedAction(fn, delay, max, reverse) {
                clearInterval(interval);
                currentAction = reverse ? max : 1;
                fn(currentAction);
                if (!max || (!reverse && currentAction < max) || (reverse && currentAction > 0)) {
                    interval = setInterval(function () {
                        currentAction = reverse ? currentAction - 1 : currentAction + 1;
                        fn(currentAction);
                        if ((!reverse && max && currentAction === max) || (reverse && currentAction === 0)) {
                            clearInterval(interval);
                        }
                    }, delay);
                }
            }

            function performAction(value) {
                var action, val, current;
                sequence = typeof (value) === 'object' ? value : sequence.concat(value.split('|'));
                timedAction(function (index) {
                    current = sequence.shift();
                    action = getAction(current);
                    val = getValue(current);
                    switch (action) {
                        case 'countdown':
                            val = parseInt(val) || 10;
                            val = val > 0 ? val : 10;
                            timedAction(function (index) {
                                if (index === 0) {
                                    if (sequence.length === 0) {
                                        S.Shape.switchShape(S.ShapeBuilder.letter(''));
                                        showFinalEffect();
                                    } else {
                                        performAction(sequence);
                                    }
                                } else {
                                    S.Shape.switchShape(S.ShapeBuilder.letter(index), true);
                                }
                            }, 1000, val, true);
                            break;
                        case 'rectangle':
                            val = val && val.split('x');
                            val = (val && val.length === 2) ? val : [maxShapeSize, maxShapeSize / 2];
                            S.Shape.switchShape(S.ShapeBuilder.rectangle(Math.min(maxShapeSize, parseInt(val[0])), Math.min(maxShapeSize, parseInt(val[1]))));
                            break;
                        case 'circle':
                            val = parseInt(val) || maxShapeSize;
                            val = Math.min(val, maxShapeSize);
                            S.Shape.switchShape(S.ShapeBuilder.circle(val));
                            break;
                        case 'time':
                            var t = formatTime(new Date());
                            if (sequence.length > 0) {
                                S.Shape.switchShape(S.ShapeBuilder.letter(t));
                            } else {
                                timedAction(function () {
                                    t = formatTime(new Date());
                                    if (t !== time) {
                                        time = t;
                                        S.Shape.switchShape(S.ShapeBuilder.letter(time));
                                    }
                                }, 1000);
                            }
                            break;
                        default:
                            S.Shape.switchShape(S.ShapeBuilder.letter(current[0] === cmd ? 'HacPai' : current));
                    }
                }, 2000, sequence.length);
            }

            return {
                simulate: function (actions) {
                    if (Array.isArray(actions)) {
                        var i = 0;
                        function run() {
                            if (i >= actions.length) return;
                            performAction(actions[i].text);
                            var delay = actions[i].delay || 0;
                            setTimeout(function () {
                                i++;
                                run();
                            }, delay);
                        }
                        run();
                    } else {
                        performAction(actions);
                    }
                }
            };
        }());

        S.Point = function (args) {
            this.x = args.x;
            this.y = args.y;
            this.z = args.z;
            this.a = args.a;
            this.h = args.h;
        };

        S.Color = function (r, g, b, a) {
            this.r = r;
            this.g = g;
            this.b = b;
            this.a = a;
        };
        S.Color.prototype = {
            render: function () {
                return 'rgba(' + this.r + ',' + this.g + ',' + this.b + ',' + this.a + ')';
            }
        };

        S.Dot = function (x, y) {
            this.p = new S.Point({ x: x, y: y, z: 5, a: 1, h: 0 });
            this.e = 0.07;
            this.s = true;
            this.c = new S.Color(255, 255, 255, this.p.a);
            this.t = this.clone();
            this.q = [];
        };
        S.Dot.prototype = {
            clone: function () {
                return new S.Point({ x: this.p.x, y: this.p.y, z: this.p.z, a: this.p.a, h: this.p.h });
            },
            _draw: function () {
                this.c.a = this.p.a;
                S.Drawing.drawCircle(this.p, this.c);
            },
            _moveTowards: function (n) {
                var details = this.distanceTo(n, true),
                    dx = details[0], dy = details[1], d = details[2],
                    e = this.e * d;
                if (this.p.h === -1) {
                    this.p.x = n.x; this.p.y = n.y; return true;
                }
                if (d > 1) {
                    this.p.x -= (dx / d) * e;
                    this.p.y -= (dy / d) * e;
                } else {
                    if (this.p.h > 0) this.p.h--;
                    else return true;
                }
                return false;
            },
            _update: function () {
                if (this._moveTowards(this.t)) {
                    var p = this.q.shift();
                    if (p) {
                        this.t.x = p.x || this.p.x;
                        this.t.y = p.y || this.p.y;
                        this.t.z = p.z || this.p.z;
                        this.t.a = p.a || this.p.a;
                        this.p.h = p.h || 0;
                    } else {
                        if (this.s) {
                            this.p.x -= Math.sin(Math.random() * 3.142);
                            this.p.y -= Math.sin(Math.random() * 3.142);
                        } else {
                            this.move(new S.Point({
                                x: this.p.x + (Math.random() * 50) - 25,
                                y: this.p.y + (Math.random() * 50) - 25
                            }));
                        }
                    }
                }
                var d = this.p.a - this.t.a;
                this.p.a = Math.max(0.1, this.p.a - (d * 0.05));
                d = this.p.z - this.t.z;
                this.p.z = Math.max(1, this.p.z - (d * 0.05));
            },
            distanceTo: function (n, details) {
                var dx = this.p.x - n.x,
                    dy = this.p.y - n.y,
                    d = Math.sqrt(dx * dx + dy * dy);
                return details ? [dx, dy, d] : d;
            },
            move: function (p, avoidStatic) {
                if (!avoidStatic || (avoidStatic && this.distanceTo(p) > 1)) {
                    this.q.push(p);
                }
            },
            render: function () {
                this._update();
                this._draw();
            }
        };

        S.ShapeBuilder = (function () {
            var gap = 13,
                shapeCanvas = document.createElement('canvas'),
                shapeContext = shapeCanvas.getContext('2d'),
                fontSize = 500,
                fontFamily = 'Aptos, "Helvetica Neue", Helvetica, Arial, sans-serif';

            function fit() {
                shapeCanvas.width = Math.floor(window.innerWidth / gap) * gap;
                shapeCanvas.height = Math.floor(window.innerHeight / gap) * gap;
                shapeContext.fillStyle = 'red';
                shapeContext.textBaseline = 'middle';
                shapeContext.textAlign = 'center';
            }

            function processCanvas() {
                var pixels = shapeContext.getImageData(0, 0, shapeCanvas.width, shapeCanvas.height).data,
                    dots = [], x = 0, y = 0,
                    fx = shapeCanvas.width, fy = shapeCanvas.height,
                    w = 0, h = 0;

                for (var p = 0; p < pixels.length; p += (4 * gap)) {
                    if (pixels[p + 3] > 0) {
                        dots.push(new S.Point({ x: x, y: y }));
                        w = x > w ? x : w;
                        h = y > h ? y : h;
                        fx = x < fx ? x : fx;
                        fy = y < fy ? y : fy;
                    }
                    x += gap;
                    if (x >= shapeCanvas.width) {
                        x = 0;
                        y += gap;
                        p += gap * 4 * shapeCanvas.width;
                    }
                }
                return { dots: dots, w: w + fx, h: h + fy };
            }

            function setFontSize(s) {
                shapeContext.font = 'bold ' + s + 'px ' + fontFamily;
            }

            function isNumber(n) {
                return !isNaN(parseFloat(n)) && isFinite(n);
            }

            function init() {
                fit();
                window.addEventListener('resize', fit);
            }
            init();

            return {
                letter: function (l) {
                    var s = 0;
                    setFontSize(fontSize);
                    s = Math.min(fontSize,
                        (shapeCanvas.width / shapeContext.measureText(l).width) * 0.8 * fontSize,
                        (shapeCanvas.height / fontSize) * (isNumber(l) ? 1 : 0.45) * fontSize);
                    setFontSize(s);
                    shapeContext.clearRect(0, 0, shapeCanvas.width, shapeCanvas.height);
                    shapeContext.fillText(l, shapeCanvas.width / 2, shapeCanvas.height / 2);
                    return processCanvas();
                },
                circle: function (d) {
                    var r = Math.max(0, d) / 2;
                    shapeContext.clearRect(0, 0, shapeCanvas.width, shapeCanvas.height);
                    shapeContext.beginPath();
                    shapeContext.arc(r * gap, r * gap, r * gap, 0, 2 * Math.PI, false);
                    shapeContext.fill();
                    shapeContext.closePath();
                    return processCanvas();
                }
            };
        }());

        S.Shape = (function () {
            var dots = [], width = 0, height = 0, cx = 0, cy = 0;

            function compensate() {
                var a = S.Drawing.getArea();
                cx = a.w / 2 - width / 2;
                cy = a.h / 2 - height / 2;
            }

            return {
                switchShape: function (n, fast) {
                    var size, a = S.Drawing.getArea();
                    width = n.w;
                    height = n.h;
                    compensate();

                    if (n.dots.length > dots.length) {
                        size = n.dots.length - dots.length;
                        for (var d = 1; d <= size; d++) {
                            dots.push(new S.Dot(a.w / 2, a.h / 2));
                        }
                    }

                    var d = 0, i = 0;
                    while (n.dots.length > 0) {
                        i = Math.floor(Math.random() * n.dots.length);
                        dots[d].e = fast ? 0.25 : (dots[d].s ? 0.14 : 0.11);

                        if (dots[d].s) {
                            dots[d].move(new S.Point({ z: Math.random() * 20 + 10, a: Math.random(), h: 18 }));
                        } else {
                            dots[d].move(new S.Point({ z: Math.random() * 5 + 5, h: fast ? 18 : 30 }));
                        }
                        dots[d].s = true;
                        dots[d].move(new S.Point({
                            x: n.dots[i].x + cx,
                            y: n.dots[i].y + cy,
                            a: 1,
                            z: 5,
                            h: 0
                        }));
                        n.dots = n.dots.slice(0, i).concat(n.dots.slice(i + 1));
                        d++;
                    }

                    for (var i = d; i < dots.length; i++) {
                        if (dots[i].s) {
                            dots[i].move(new S.Point({ z: Math.random() * 20 + 10, a: Math.random(), h: 20 }));
                            dots[i].s = false;
                            dots[i].e = 0.04;
                            dots[i].move(new S.Point({
                                x: Math.random() * a.w,
                                y: Math.random() * a.h,
                                a: 0.3,
                                z: Math.random() * 4,
                                h: 0
                            }));
                        }
                    }
                },
                render: function () {
                    for (var d = 0; d < dots.length; d++) {
                        dots[d].render();
                    }
                }
            };
        }());

        // =============================================
        //    ICON TÌNH CẢM RƠI TỪ ĐẦU
        // =============================================
        const loveItems = ["💖", "❤️", "🌸", "🌹", "🍓", "💗", "✨", "💞", "🌷", "💕"];

        function createFallingLove() {
            const item = document.createElement("div");
            item.className = "fall";
            item.textContent = loveItems[Math.floor(Math.random() * loveItems.length)];
            item.style.left = Math.random() * 100 + "%";
            item.style.animationDuration = (Math.random() * 7 + 9) + "s";
            item.style.fontSize = (Math.random() * 18 + 24) + "px";
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 18000);
        }

        setInterval(createFallingLove, 1100);

        // =============================================
        //    ẢNH RƠI TUẦN TỰ
        // =============================================
        const photos = [
            "images/a1.webp",
            "images/a2.webp",
            "images/a3.webp",
            "images/a4.jpg",
            "images/a5.webp",
            "images/a6.webp",
            "images/a7.webp",
            "images/a8.webp",
            "images/a9.webp",
            "images/a10.webp",
            "images/a11.webp",
            "images/a12.webp",
            "images/a13.webp",
            "images/a14.webp",
            "images/a15.webp"
        ];
        let photoIndex = 0;

        function dropSidePhoto() {
            const side = Math.random() < 0.5 ? "left" : "right";
            const photo = document.createElement("img");
            photo.className = "photo-fall";
            photo.src = photos[photoIndex];

            if (side === "left") {
                photo.style.left = (Math.random() * 35 + 5) + "%";
            } else {
                photo.style.left = (Math.random() * 35 + 60) + "%";
            }

            photo.style.animationDuration = (Math.random() * 3 + 4) + "s"; // 4-7 giây

            document.body.appendChild(photo);
            setTimeout(() => photo.remove(), 12000);

            photoIndex = (photoIndex + 1) % photos.length;
        }

        // =============================================
        //    HIỆU ỨNG SAU COUNTDOWN
        // =============================================
        function showFinalEffect() {
            const canvas = document.querySelector('canvas.canvas');
            canvas.style.opacity = '0.25';

            document.getElementById('happy-birthday').classList.add('visible');
            document.getElementById('beating-heart').classList.add('visible');

            setInterval(dropSidePhoto, 1800); // cách nhau 1.8 giây
        }

        // =============================================
        //    NHẤN → PHÁT NHẠC CHẬM HƠN + CHẠY
        // =============================================
        const intro = document.getElementById("intro");
        const music = document.getElementById("music");

        // Đặt tốc độ nhạc chậm hơn ngay từ đầu
        music.playbackRate = 0.95;  // chậm khoảng 15%, nghe tự nhiên hơn
        if ('preservesPitch' in music) {
            music.preservesPitch = true;  // giữ nguyên cao độ giọng hát (nếu browser hỗ trợ)
        }

        intro.addEventListener("click", () => {
            intro.classList.add("hidden");

            music.currentTime = 0;
            music.play().then(() => {
                S.init();
            }).catch(() => {
                document.body.addEventListener("click", function handler() {
                    music.play();
                    S.init();
                    document.body.removeEventListener("click", handler);
                }, { once: true });
            });
        });
    </script>
</body>
</html>
